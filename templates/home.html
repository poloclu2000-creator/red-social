<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>TELEINFORMATICOS CHAT</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

    <nav class="navbar navbar-dark bg-black p-3">

        <div class="container-fluid">

            <a class="navbar-brand">
               TELEINFORMATICOS CHAT
            </a>

            <div>

                <span class="me-3">
                    {{ current_user.username }}
                </span>

                <a href="/logout" class="btn btn-danger">
                    Cerrar sesión
                </a>

            </div>

        </div>

    </nav>

    <div class="container mt-4">

        <div class="card bg-secondary p-3 mb-4">

            <form action="/crear_post" method="POST">

                <textarea
                    name="content"
                    class="form-control mb-3"
                    placeholder="¿Qué estás pensando?"
                    required></textarea>

                <button class="btn btn-primary">
                    Publicar
                </button>

            </form>

        </div>

        {% for post in posts %}

        <div class="card bg-black text-light mb-3 p-3">

            <div class="d-flex align-items-center mb-2">

    <img
        src="{{ url_for('static', filename='uploads/' + post.author.profile_pic) }}"
        width="50"
        height="50"
        class="rounded-circle me-2">

    <h5>
        {{ post.author.username }}
    </h5>

</div>

            <p>
                {{ post.content }}
            </p>

            <a href="/like/{{ post.id }}" class="btn btn-outline-primary">

                ❤️ Like {{ post.likes }}

            </a>
<!-- FORMULARIO COMENTAR -->
<form action="{{ url_for('comentario', post_id=post.id) }}" method="POST" class="mt-3">

    <input 
        type="text" 
        name="content" 
        class="form-control mb-2"
        placeholder="Escribe un comentario"
        required>

    <button class="btn btn-sm btn-light">
        Comentar
    </button>

</form>
<!-- MOSTRAR COMENTARIOS -->
{% for comment in post.comments %}

    <div class="mt-2 p-2 bg-secondary rounded">

        <b>{{ comment.author.username }}</b>:
        {{ comment.content }}

    </div>

{% endfor %}

        </div>

        {% endfor %}

    </div>

</body>

</html>
